<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Engine Sound Simulator</title><meta name="robots" content="noindex,nofollow"><link rel="stylesheet" href="style.1c9a0a2d72.css"></head><body><div id="startOverlay"><div class="overlay-box"><h1>Engine Sound Simulator</h1><p>物理ベースのエンジンサウンド合成 / OSC制御対応</p><button id="startBtn">▶ オーディオを開始</button></div></div><header><h1>🏁 Engine Sound Simulator</h1><div class="header-right"><span id="midiStatus" class="badge">MIDI: 未接続</span><span id="oscStatus" class="badge">OSC: 待機中</span><span id="wsStatus" class="badge">WS: 未接続</span></div></header><main><section id="dashboard"><div id="gauges"><canvas id="tach" width="320" height="320"></canvas><canvas id="speedo" width="320" height="320"></canvas></div><div id="readouts"><div class="readout"><span id="rpmVal">0</span><label>RPM</label></div><div class="readout"><span id="gearVal">N</span><label>GEAR</label></div><div class="readout"><span id="speedVal">0</span><label>km/h</label></div></div><div class="controls-panel"><div class="pedal-row"><div class="pedal"><input type="range" id="brake" min="0" max="100" value="0" orient="vertical" class="vslider brake-s"><label>ブレーキ<br><span id="brkVal">0%</span></label></div><div class="pedal"><input type="range" id="throttle" min="0" max="100" value="0" orient="vertical" class="vslider"><label>アクセル<br><span id="thrVal">0%</span></label></div></div><div class="ctl-row"><label>音量</label><input type="range" id="volume" min="0" max="100" value="60"></div><div class="ctl-row output-row"><label>出力先 <span id="audioOutputStatus">Default</span></label><div class="device-controls"><select id="audioOutput" aria-label="音声出力先"></select><button id="audioOutputRefreshBtn" type="button">選択</button></div></div><div class="btn-row"><button id="ignitionBtn" class="toggle on" title="エンジンの始動/停止">エンジン ON</button><button id="gearDownBtn">◀ シフトダウン</button><button id="gearUpBtn">シフトアップ ▶</button><button id="neutralBtn">N</button></div><div class="ctl-row mode-row"><label>RPMモード</label><select id="rpmMode"><option value="sim">内部シミュレーション</option><option value="ext">外部RPM直接指定</option></select></div><div class="ctl-row" id="extRpmRow" style="display:none"><label>外部RPM <span id="extRpmVal">1000</span></label><input type="range" id="extRpm" min="0" max="16000" value="1000"></div><div class="ctl-row mode-row"><label>外部入力 <span id="externalInputStatus">OSC</span></label><select id="externalInput"><option value="osc">OSC UDP</option><option value="midi">Web MIDI</option></select></div><div class="ctl-row midi-row" id="midiRow" style="display:none"><div class="midi-controls"><button id="midiConnectBtn" type="button">Web MIDI接続</button><select id="midiInput" aria-label="MIDI入力"></select></div></div><p class="hint">キーボード: <kbd>W</kbd>/<kbd>↑</kbd> アクセル, <kbd>S</kbd>/<kbd>↓</kbd> ブレーキ, <kbd>E</kbd> シフトアップ, <kbd>Q</kbd> シフトダウン, <kbd>N</kbd> ニュートラル</p><p class="osc-help">OSC: udp/9000 → <code>/engine/throttle</code>, <code>/engine/brake</code>, <code>/engine/pedals throttle brake</code><br>Web MIDI: CC1/11 アクセル, CC2/64 ブレーキ</p><div id="oscLog" class="osc-log">OSC受信: なし</div></div></section><section id="configPanel"><div class="config-header"><h2>エンジン設定</h2><select id="preset"></select></div><form id="configForm"></form><div class="config-footer"><div class="preset-save"><input type="text" id="presetName" placeholder="プリセット名を入力して保存"><button id="savePresetBtn" type="button">保存</button><button id="deletePresetBtn" type="button">削除</button></div><div id="derivedInfo" class="derived"></div></div></section></main><script src="app.b27528d16b.js"></script></body></html>
